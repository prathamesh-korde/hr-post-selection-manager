services:
  - type: web
      name: hr-post-selection-manager
          env: node
              buildCommand: npm install --legacy-peer-deps --ignore-scripts
                  startCommand: node web-server.js
                      envVars:
                            - key: NODE_ENV
                                    value: production
                                          - key: DATA_DIR
                                                  value: /tmp
                                                        - key: NODE_VERSION
                                                                value: 22.12.0
